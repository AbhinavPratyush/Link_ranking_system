<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Research Query</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            margin-top: 100px;
        }

```
    .container {

    ```

</head>
<body>

<div class="container">
    <h3>Ask Query</h3>
    <input type="text" id="queryInput" placeholder="Enter your query..." />
    <button onclick="sendQuery()">Search</button>

    ```
    <div class="result" id="resultBox"></div>
    ```

</div>

<script>
    async function sendQuery() {
        const query = document.getElementById("queryInput").value;

        const responseBox = document.getElementById("resultBox");
        responseBox.innerHTML = "Loading...";

        try {
            const response = await fetch("http://localhost:8080/test", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    query: query
                })
            });

            const data = await response.json();

            responseBox.innerHTML = `
            <b>${data}</b>
                <b>Title:</b> ${data.title || "N/A"} <br/>
                <b>Link:</b> <a href="${data.link}" target="_blank">${data.link}</a><br/>
                <b>Snippet:</b> ${data.snippet || "N/A"}
            `;
        } catch (error) {
            responseBox.innerHTML = "Error calling API";
            console.error(error);
        }
    }
</script>

</body>
</html>
